<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Inducción de Visitas</title>
  <style>
    :root {
      --bg: #e7e0e2;
      --navy: #062b4f;
      --navy-2: #0d3a66;
      --text: #1f2937;
      --muted: #667085;
      --card: #ffffff;
      --disabled: #a7b0ba;
      --success: #1f7a3d;
      --shadow: 0 10px 30px rgba(6, 43, 79, 0.10);
      --radius-xl: 24px;
      --radius-lg: 18px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      background:
        radial-gradient(circle at top, rgba(255,255,255,0.55), transparent 35%),
        var(--bg);
      font-family: Arial, sans-serif;
      color: var(--text);
    }

    .page {
      min-height: 100vh;
      padding: 20px 14px 32px;
    }

    .container {
      max-width: 430px;
      margin: 0 auto;
    }

    .hero-card {
      background: rgba(255, 255, 255, 0.38);
      backdrop-filter: blur(8px);
      border: 1px solid rgba(255,255,255,0.45);
      border-radius: 28px;
      padding: 22px 18px 18px;
      box-shadow: var(--shadow);
      text-align: center;
      margin-bottom: 16px;
    }

    .welcome {
      font-size: 2.1rem;
      font-weight: 800;
      color: #000;
      margin: 0 0 6px;
      letter-spacing: -0.8px;
    }

    .subtitle-top {
      font-size: 1.05rem;
      font-weight: 500;
      color: #111827;
      margin-bottom: 16px;
    }

    .logo {
      width: 100px;
      height: auto;
      display: block;
      margin: 0 auto 10px;
    }

    .title {
      margin: 0;
      font-size: 2.35rem;
      line-height: 0.98;
      font-weight: 800;
      color: var(--navy);
      letter-spacing: -1px;
    }

    .panel {
      background: var(--card);
      border-radius: var(--radius-xl);
      padding: 14px;
      box-shadow: var(--shadow);
    }

    .video-shell {
      background: #000;
      border-radius: 22px;
      overflow: hidden;
      width: 100%;
      aspect-ratio: 16 / 9;
    }

    .video-shell video {
      width: 100%;
      height: 100%;
      display: block;
      object-fit: cover;
      background: #000;
    }

    .status-card {
      margin-top: 14px;
      background: #f8fafc;
      border: 1px solid #e7edf3;
      border-radius: var(--radius-lg);
      padding: 14px 14px 12px;
    }

    .status-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      margin-bottom: 10px;
    }

    .status-title {
      font-size: 0.96rem;
      font-weight: 700;
      color: var(--navy);
      margin: 0;
    }

    .status-pill {
      font-size: 0.78rem;
      font-weight: 700;
      padding: 6px 10px;
      border-radius: 999px;
      background: #eef2f6;
      color: var(--muted);
      white-space: nowrap;
    }

    .status-pill.ready {
      background: rgba(31, 122, 61, 0.12);
      color: var(--success);
    }

    .progress-wrap {
      width: 100%;
      height: 12px;
      background: #e6ebf1;
      border-radius: 999px;
      overflow: hidden;
      margin-bottom: 10px;
    }

    .progress-bar {
      width: 0%;
      height: 100%;
      background: linear-gradient(90deg, var(--navy), var(--navy-2));
      border-radius: 999px;
      transition: width 0.2s linear;
    }

    .counter {
      font-size: 0.93rem;
      color: var(--muted);
      line-height: 1.45;
      min-height: 22px;
    }

    .cta {
      margin-top: 14px;
    }

    .button {
      width: 100%;
      display: inline-flex;
      justify-content: center;
      align-items: center;
      text-align: center;
      text-decoration: none;
      padding: 16px 18px;
      border-radius: 16px;
      background: var(--disabled);
      color: white;
      font-weight: 800;
      font-size: 1.03rem;
      letter-spacing: -0.2px;
      pointer-events: none;
      box-shadow: 0 8px 22px rgba(0,0,0,0.10);
      transition: transform 0.2s ease, background 0.25s ease, box-shadow 0.25s ease;
    }

    .button.enabled {
      background: linear-gradient(180deg, var(--navy-2), var(--navy));
      pointer-events: auto;
      box-shadow: 0 14px 28px rgba(6, 43, 79, 0.24);
    }

    .helper {
      margin-top: 10px;
      text-align: center;
      font-size: 0.84rem;
      color: var(--muted);
    }

    @media (max-width: 380px) {
      .welcome { font-size: 1.9rem; }
      .title { font-size: 2.05rem; }
      .button { font-size: 0.98rem; }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="container">
      <section class="hero-card">
        <h1 class="welcome">¡Bienvenido!</h1>
        <div class="subtitle-top">Inducción de Visitas</div>

        <img
          class="logo"
          src="https://upload.wikimedia.org/wikipedia/commons/thumb/d/da/Repsol_2025_%28vertical%29.svg/960px-Repsol_2025_%28vertical%29.svg.png"
          alt="Repsol"
        />

        <h2 class="title">Video de<br>inducción</h2>
      </section>

      <section class="panel">
        <div class="video-shell">
          <video id="miVideo" controls preload="metadata" playsinline>
            <source src="assets/induccion-visitas.mp4" type="video/mp4" />
            Tu navegador no soporta video HTML5.
          </video>
        </div>

        <div class="status-card">
          <div class="status-top">
            <p class="status-title">Estado de visualización</p>
            <span id="statusPill" class="status-pill">Pendiente</span>
          </div>

          <div class="progress-wrap" aria-hidden="true">
            <div id="progressBar" class="progress-bar"></div>
          </div>

          <div id="counter" class="counter">
            Reproduce y termina el video para habilitar el registro.
          </div>
        </div>

        <div class="cta">
          <a
            id="asistenciaBtn"
            class="button"
            href="https://forms.cloud.microsoft/Pages/ResponsePage.aspx?id=TyElClLuPEi5a9x58yJ6b9qTKegBo1NNnvwGkwl8VLJUOUpCQTE5WFlGVlFNRDlPRUkwSVlXUVlTSiQlQCN0PWcu"
            target="_blank"
            rel="noopener noreferrer"
            aria-disabled="true"
          >
            Registra Aquí tu Asistencia
          </a>
          <div class="helper">El botón se activará cuando el video finalice.</div>
        </div>
      </section>
    </div>
  </div>

  <script>
    const video = document.getElementById("miVideo");
    const btn = document.getElementById("asistenciaBtn");
    const counter = document.getElementById("counter");
    const progressBar = document.getElementById("progressBar");
    const statusPill = document.getElementById("statusPill");

    function enableButton() {
      btn.classList.add("enabled");
      btn.setAttribute("aria-disabled", "false");
      statusPill.textContent = "Completado";
      statusPill.classList.add("ready");
      progressBar.style.width = "100%";
      counter.textContent = "Video completado. Ya puedes registrar tu asistencia.";
    }

    video.addEventListener("loadedmetadata", () => {
      counter.textContent = "Video cargado. Reprodúcelo completo para habilitar el registro.";
      statusPill.textContent = "Listo";
    });

    video.addEventListener("play", () => {
      statusPill.textContent = "En progreso";
    });

    video.addEventListener("pause", () => {
      if (!video.ended) {
        statusPill.textContent = "Pausado";
        counter.textContent = "El video está en pausa. Debes terminarlo para habilitar el registro.";
      }
    });

    video.addEventListener("timeupdate", () => {
      if (!video.duration || !isFinite(video.duration)) return;

      const percent = (video.currentTime / video.duration) * 100;
      progressBar.style.width = `${Math.min(percent, 100)}%`;

      const secondsLeft = Math.max(Math.ceil(video.duration - video.currentTime), 0);

      if (!video.ended && secondsLeft > 0) {
        counter.textContent = `Visualizando video... faltan aproximadamente ${secondsLeft} segundos para completar la inducción.`;
      }
    });

    video.addEventListener("ended", () => {
      enableButton();
    });
  </script>
</body>
</html>
